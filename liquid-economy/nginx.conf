server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # News tracker proxy — injects X-API-Key server-side so the browser
    # never sees the key. TRACKER_API_KEY is substituted at container start
    # by the nginx image's built-in envsubst (see Dockerfile).
    resolver 1.1.1.1 8.8.8.8 ipv6=off valid=300s;
    location /api/news/ {
        proxy_pass http://t122yraee5v724x7tonr3d6g.204.168.192.245.sslip.io/;
        proxy_http_version 1.1;
        proxy_set_header Host t122yraee5v724x7tonr3d6g.204.168.192.245.sslip.io;
        proxy_set_header X-API-Key "${TRACKER_API_KEY}";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # Cache static assets aggressively (Vite content-hashes them)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — all routes resolve to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health probe for Coolify
    location /healthz {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
